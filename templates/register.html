{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="display-4 mb-2" style="color:#4f46e5;"><i class="bi bi-person-plus-fill"></i></div>
      <h4 class="fw-bold">Create Account</h4>
      <p class="text-muted small">Register to get started</p>
    </div>
    <div class="card p-4">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
      </div>
      {% endif %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input name="username" class="form-control border-start-0" placeholder="Choose a username" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input name="email" type="email" class="form-control border-start-0" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input name="password" type="password" class="form-control border-start-0" placeholder="Create a password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-person-check me-2"></i>Register
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center small text-muted mb-0">Already have an account? <a href="/login" class="text-decoration-none" style="color:#4f46e5;">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
