{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="display-4 mb-2" style="color:#4f46e5;"><i class="bi bi-lock-fill"></i></div>
      <h4 class="fw-bold">Reset Password</h4>
    </div>
    <div class="card p-4">
      {% if invalid %}
      <div class="alert alert-danger d-flex gap-2 align-items-center">
        <i class="bi bi-x-circle-fill"></i>
        This reset link is invalid or has expired.
      </div>
      <a href="/forgot_password" class="btn btn-primary w-100">Request a new link</a>
      {% else %}
        {% if error %}
        <div class="alert alert-danger d-flex gap-2 align-items-center">
          <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
        </div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label small">New Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
              <input name="password" type="password" class="form-control border-start-0" placeholder="New password" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
              <input name="confirm" type="password" class="form-control border-start-0" placeholder="Confirm password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-check-circle me-2"></i>Reset Password
          </button>
        </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
