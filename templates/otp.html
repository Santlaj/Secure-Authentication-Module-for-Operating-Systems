{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="display-4 mb-2" style="color:#4f46e5;"><i class="bi bi-shield-check"></i></div>
      <h4 class="fw-bold">Two-Factor Verification</h4>
      <p class="text-muted small">Enter the OTP sent to your email or shown in your authenticator app</p>
    </div>
    <div class="card p-4">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
      </div>
      {% endif %}
      <form method="POST">
        <div class="mb-4">
          <label class="form-label small">6-Digit OTP Code</label>
          <input name="otp" class="form-control form-control-lg text-center fw-bold"
            placeholder="000000" maxlength="6" pattern="\d{6}"
            style="letter-spacing:.4rem; font-size:1.5rem;" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-check-circle me-2"></i>Verify OTP
        </button>
      </form>
      <p class="text-center text-muted small mt-3 mb-0">
        <i class="bi bi-clock me-1"></i>OTP expires in 30 seconds
      </p>
    </div>
  </div>
</div>
{% endblock %}
