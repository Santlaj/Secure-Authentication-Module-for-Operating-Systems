{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="display-4 mb-2" style="color:#4f46e5;"><i class="bi bi-shield-lock-fill"></i></div>
      <h4 class="fw-bold">Welcome back</h4>
      <p class="text-muted small">Sign in to your secure account</p>
    </div>
    <div class="card p-4">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
      </div>
      {% endif %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-500 small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input name="username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500 small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input name="password" type="password" class="form-control border-start-0" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
      <hr class="my-3">
      <div class="d-flex justify-content-between small">
        <a href="/forgot_password" class="text-decoration-none text-muted">Forgot password?</a>
        <a href="/register" class="text-decoration-none" style="color:#4f46e5;">Create account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
