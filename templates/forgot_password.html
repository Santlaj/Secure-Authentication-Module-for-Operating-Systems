{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="display-4 mb-2" style="color:#4f46e5;"><i class="bi bi-key-fill"></i></div>
      <h4 class="fw-bold">Forgot Password?</h4>
      <p class="text-muted small">Enter your email and we'll send you a reset link</p>
    </div>
    <div class="card p-4">
      {% if message %}
      <div class="alert alert-success d-flex gap-2 align-items-center">
        <i class="bi bi-check-circle-fill"></i> {{ message }}
      </div>
      {% else %}
      <form method="POST">
        <div class="mb-4">
          <label class="form-label small">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input name="email" type="email" class="form-control border-start-0" placeholder="your@email.com" required autofocus>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </form>
      {% endif %}
      <hr class="my-3">
      <p class="text-center small text-muted mb-0">
        <a href="/login" class="text-decoration-none" style="color:#4f46e5;">Back to Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
